# Release build: runs on tag push (e.g. v0.10.8).
# Keep tag and version aligned: bump pyproject.toml (and optionally unveil-burp version) before tagging. See docs/RELEASING.md.
name: build-release
on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Python package
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade build twine
      - run: python -m build

      - name: Set up Java for Burp extension
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
      - name: Build Burp extension JAR
        run: |
          cd unveil-burp
          chmod +x gradlew
          ./gradlew jar
          ls -la build/libs/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            dist/*
            unveil-burp/build/libs/unveil-burp-*.jar

  build-windows-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Unveil and PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install pyinstaller
      - name: Build daemon exe (no-console so Burp can start it hidden)
        run: |
          pyinstaller --onefile --noconsole -n unveil-daemon --collect-all unveil scripts/run_daemon.py
          dir dist
      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: windows-daemon-exe
          path: dist/unveil-daemon.exe

  release:
    needs: [build-linux, build-windows-exe]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python (for twine)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install zip and twine
        run: |
          sudo apt-get update && sudo apt-get install -y zip
          python -m pip install --upgrade twine

      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: linux-build
          path: linux-build
      - name: Download Windows exe
        uses: actions/download-artifact@v4
        with:
          name: windows-daemon-exe
          path: windows-exe

      - name: Create Windows (WIN) engine exe and plug-and-play zips
        run: |
          cp windows-exe/unveil-daemon.exe windows-exe/unveil-engine-WIN.exe
          mkdir -p unveil-burp-plug-and-play-windows
          find linux-build -name "unveil-burp-*.jar" -exec cp {} unveil-burp-plug-and-play-windows/ \;
          cp windows-exe/unveil-daemon.exe unveil-burp-plug-and-play-windows/
          cat > unveil-burp-plug-and-play-windows/README.txt << 'EOF'
          Unveil Burp extension — plug and play (Windows)
          ================================================

          1. Load the JAR in Burp: Extensions → Installed → Add → Java → select unveil-burp-*.jar
          2. Double-click unveil-daemon.exe (keep it running)
          3. In the Unveil tab: check "Use daemon", URL http://127.0.0.1:8000
          4. Enter a path (e.g. C:\Program Files\MyApp) and click Scan

          No Python or pip install needed.
          EOF
          zip -r unveil-burp-plug-and-play-windows.zip unveil-burp-plug-and-play-windows
          mkdir -p Unveil-WIN-plug-and-play
          find linux-build -name "unveil-burp-*.jar" -exec cp {} Unveil-WIN-plug-and-play/ \;
          cp windows-exe/unveil-engine-WIN.exe Unveil-WIN-plug-and-play/
          cat > Unveil-WIN-plug-and-play/README.txt << 'EOF'
          Unveil — Windows-only (WIN) plug and play
          ==========================================

          WIN variant: use unveil-engine-WIN.exe. Extension auto-starts it from %LOCALAPPDATA%\Unveil.
          Run Setup-Unveil-Windows.ps1 for one-click install, or drop these files into %LOCALAPPDATA%\Unveil.

          1. Load unveil-burp-*.jar in Burp (Extensions → Add → Java).
          2. Extension will auto-start unveil-engine-WIN.exe when you Scan (or run it manually).
          3. In Unveil tab: Use daemon, URL http://127.0.0.1:8000. Click Scan.
          EOF
          zip -r Unveil-WIN-plug-and-play.zip Unveil-WIN-plug-and-play
          ls -la windows-exe/ Unveil-WIN-plug-and-play.zip

      - name: Create Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            linux-build/dist/*
            linux-build/unveil-burp/build/libs/unveil-burp-*.jar
            windows-exe/unveil-daemon.exe
            windows-exe/unveil-engine-WIN.exe
            unveil-burp-plug-and-play-windows.zip
            Unveil-WIN-plug-and-play.zip
          body_path: CHANGELOG.md
          generate_release_notes: true

      - name: Publish to PyPI
        if: success()
        run: twine upload linux-build/dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
